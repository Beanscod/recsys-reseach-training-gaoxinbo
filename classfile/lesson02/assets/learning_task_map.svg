<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="500" viewBox="0 0 1400 500"><defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#2F6FA5"/></marker><filter id="shadow"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#173B63" flood-opacity="0.14"/></filter></defs><rect width="100%" height="100%" fill="white"/><text x="700.0" y="48" text-anchor="middle" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="30" font-weight="700" fill="#173B63">先看任务：模型究竟要输出什么？</text><rect x="35" y="120" width="240" height="210" rx="16" fill="#EAF3FA" stroke="#2F6FA5" stroke-width="2" filter="url(#shadow)"/><text x="155.0" y="156" text-anchor="middle" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="23" font-weight="700" fill="#173B63">回归</text><text x="155.0" y="186" text-anchor="middle" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="16" fill="#5B6770">输出：连续数值</text><text x="155.0" y="210" text-anchor="middle" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="16" fill="#5B6770">推荐例子：评分预测</text><text x="155" y="380" text-anchor="middle" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="24" font-weight="700" fill="#2F6FA5">1</text><rect x="307" y="120" width="240" height="210" rx="16" fill="#E8F5EF" stroke="#3A8D6D" stroke-width="2" filter="url(#shadow)"/><text x="427.0" y="156" text-anchor="middle" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="23" font-weight="700" fill="#173B63">分类</text><text x="427.0" y="186" text-anchor="middle" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="16" fill="#5B6770">输出：离散类别/概率</text><text x="427.0" y="210" text-anchor="middle" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="16" fill="#5B6770">推荐例子：是否点击</text><text x="427" y="380" text-anchor="middle" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="24" font-weight="700" fill="#3A8D6D">2</text><rect x="579" y="120" width="240" height="210" rx="16" fill="#FFF1E3" stroke="#F28E2B" stroke-width="2" filter="url(#shadow)"/><text x="699.0" y="156" text-anchor="middle" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="23" font-weight="700" fill="#173B63">排序</text><text x="699.0" y="186" text-anchor="middle" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="16" fill="#5B6770">输出：候选优先顺序</text><text x="699.0" y="210" text-anchor="middle" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="16" fill="#5B6770">推荐例子：推荐列表排序</text><text x="699" y="380" text-anchor="middle" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="24" font-weight="700" fill="#F28E2B">3</text><rect x="851" y="120" width="240" height="210" rx="16" fill="#F0ECF7" stroke="#7B61A8" stroke-width="2" filter="url(#shadow)"/><text x="971.0" y="156" text-anchor="middle" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="23" font-weight="700" fill="#173B63">序列预测</text><text x="971.0" y="186" text-anchor="middle" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="16" fill="#5B6770">输出：下一步事件</text><text x="971.0" y="210" text-anchor="middle" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="16" fill="#5B6770">推荐例子：下一物品预测</text><text x="971" y="380" text-anchor="middle" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="24" font-weight="700" fill="#7B61A8">4</text><rect x="1123" y="120" width="240" height="210" rx="16" fill="#F4F6F8" stroke="#5B6770" stroke-width="2" filter="url(#shadow)"/><text x="1243.0" y="156" text-anchor="middle" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="23" font-weight="700" fill="#173B63">生成</text><text x="1243.0" y="186" text-anchor="middle" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="16" fill="#5B6770">输出：新的内容序列</text><text x="1243.0" y="210" text-anchor="middle" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="16" fill="#5B6770">推荐例子：推荐理由/对话</text><text x="1243" y="380" text-anchor="middle" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="24" font-weight="700" fill="#5B6770">5</text><text x="700" y="455" text-anchor="middle" font-family="Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="20" font-weight="700" fill="#C94C4C">同一份用户行为数据，可以因为研究问题不同而形成不同学习任务</text></svg>