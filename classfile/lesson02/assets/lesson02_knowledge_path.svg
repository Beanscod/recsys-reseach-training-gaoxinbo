<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520">
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#2F6FA5"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#173B63" flood-opacity="0.14"/>
    </filter>
    <style>
      .font { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; }
      .title { font-size: 22px; font-weight: 700; fill: #173B63; }
      .sub { font-size: 15px; font-weight: 400; fill: #526270; }
      .step { font-size: 14px; font-weight: 700; fill: #2F6FA5; letter-spacing: 1px; }
    </style>
  </defs>
  <rect width="1400" height="520" fill="#FFFFFF"/>
  <text x="700" y="52" text-anchor="middle" class="font" font-size="30" font-weight="700" fill="#173B63">从代码阅读到推荐表示</text>
  <text x="700" y="82" text-anchor="middle" class="font" font-size="16" fill="#5B6770">同一条计算主线连接基础概念、模型训练与Embedding</text>

  <g filter="url(#shadow)">
    <rect x="45" y="130" width="230" height="180" rx="20" fill="#EAF3FA" stroke="#2F6FA5" stroke-width="2"/>
    <rect x="315" y="130" width="230" height="180" rx="20" fill="#E8F5EF" stroke="#3A8D6D" stroke-width="2"/>
    <rect x="585" y="130" width="230" height="180" rx="20" fill="#F3EEFA" stroke="#7656A5" stroke-width="2"/>
    <rect x="855" y="130" width="230" height="180" rx="20" fill="#FFF1E3" stroke="#F28E2B" stroke-width="2"/>
    <rect x="1125" y="130" width="230" height="180" rx="20" fill="#FCECEF" stroke="#C94F67" stroke-width="2"/>
  </g>

  <text x="160" y="160" text-anchor="middle" class="font step">01</text>
  <text x="160" y="198" text-anchor="middle" class="font title">Python代码阅读</text>
  <text x="160" y="232" text-anchor="middle" class="font sub">容器 · 索引 · 循环</text>
  <text x="160" y="258" text-anchor="middle" class="font sub">函数 · 类 · 配置</text>
  <text x="160" y="284" text-anchor="middle" class="font sub">理解输入、处理与输出</text>

  <text x="430" y="160" text-anchor="middle" class="font step" fill="#3A8D6D">02</text>
  <text x="430" y="198" text-anchor="middle" class="font title">Tensor数据表示</text>
  <text x="430" y="232" text-anchor="middle" class="font sub">dtype · shape · Batch</text>
  <text x="430" y="258" text-anchor="middle" class="font sub">批量计算 · 自动求导</text>
  <text x="430" y="284" text-anchor="middle" class="font sub">统一数据与模型参数</text>

  <text x="700" y="160" text-anchor="middle" class="font step" fill="#7656A5">03</text>
  <text x="700" y="194" text-anchor="middle" class="font title">机器学习 / 深度学习</text>
  <text x="700" y="228" text-anchor="middle" class="font sub">数据划分 · 模型 · Logit</text>
  <text x="700" y="254" text-anchor="middle" class="font sub">Loss · 优化 · 评价</text>
  <text x="700" y="280" text-anchor="middle" class="font sub">线性模型到Transformer</text>

  <text x="970" y="160" text-anchor="middle" class="font step" fill="#F28E2B">04</text>
  <text x="970" y="198" text-anchor="middle" class="font title">二维二分类实验</text>
  <text x="970" y="232" text-anchor="middle" class="font sub">Dataset · DataLoader</text>
  <text x="970" y="258" text-anchor="middle" class="font sub">Forward · Backward</text>
  <text x="970" y="284" text-anchor="middle" class="font sub">运行完整训练闭环</text>

  <text x="1240" y="160" text-anchor="middle" class="font step" fill="#C94F67">05</text>
  <text x="1240" y="198" text-anchor="middle" class="font title">Embedding与点积</text>
  <text x="1240" y="232" text-anchor="middle" class="font sub">离散ID → 可训练向量</text>
  <text x="1240" y="258" text-anchor="middle" class="font sub">用户表示 · 物品表示</text>
  <text x="1240" y="284" text-anchor="middle" class="font sub">向量匹配得到分数</text>

  <line x1="278" y1="220" x2="304" y2="220" stroke="#2F6FA5" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="548" y1="220" x2="574" y2="220" stroke="#2F6FA5" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="818" y1="220" x2="844" y2="220" stroke="#2F6FA5" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1088" y1="220" x2="1114" y2="220" stroke="#2F6FA5" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="185" y="365" width="1030" height="105" rx="22" fill="#F7FAFC" stroke="#B8C9D8" stroke-width="2"/>
  <text x="700" y="400" text-anchor="middle" class="font" font-size="17" font-weight="700" fill="#173B63">统一计算主线</text>
  <text x="700" y="442" text-anchor="middle" class="font" font-size="21" font-weight="700" fill="#2F6FA5">输入表示 → 模型计算 → 预测分数 → Loss → 参数更新 → 验证</text>
</svg>
